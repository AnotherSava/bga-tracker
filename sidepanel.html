<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGA Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Barlow+Condensed&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/sidepanel/sidepanel.css">
</head>
<body>
  <div class="top-buttons">
    <span class="game-status"><span id="game-info-table" class="game-info"></span><span id="live-indicator" class="live-dot" style="display:none"></span><span id="game-info-time" class="game-info"></span></span>
    <div id="zoom-indicator" class="zoom-indicator"></div>
    <button id="btn-zoom-out" title="Zoom out (Ctrl+-)"><svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
    <button id="btn-zoom-in" title="Zoom in (Ctrl+=)"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
    <button id="btn-sections" title="Toggle section visibility"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
    <button id="btn-download" title="Download all data" style="display:none"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></button>
    <button id="btn-help" title="Help">?</button>
  </div>
  <div id="section-selector" style="display:none"></div>
  <div id="content">
    <div class="status">Waiting for game data...</div>
  </div>
  <script type="module" src="src/sidepanel/sidepanel.ts"></script>
</body>
</html>
